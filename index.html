<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>Arctic Sea pH searcher</title>
<style>
  :root {
    --bg: #000000;
    --card: #101010;
    --card2: #1b1b1b;
    --line: #2e2e2e;
    --text: #f2f2f2;
    --sub: #9a9a9a;
    --accent: #ffffff;
    --accent2: #cfcfcf;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 18px 0 4px; }
  .sub { text-align: center; color: var(--sub); font-size: 13px; margin-bottom: 24px; }
  .inputCard {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 16px;
  }
  label { display: block; font-size: 13px; color: var(--sub); margin: 10px 0 6px; }
  input {
    width: 100%; font-size: 18px; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: var(--bg); color: var(--text);
    outline: none; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; margin-top: 16px; padding: 14px; font-size: 17px; font-weight: 700;
    border: none; border-radius: 12px; background: #0a84ff; color: #fff;
    cursor: pointer;
  }
  button:active { opacity: .8; }
  .coordRow { display: flex; gap: 8px; }
  .coordRow input { flex: 1; min-width: 0; }
  .sign {
    flex: 0 0 52px; width: 52px; margin: 0; padding: 0;
    font-size: 24px; font-weight: 700; border-radius: 12px;
    border: 1px solid var(--line); background: var(--card2); color: var(--accent2);
  }
  .sign.neg { color: #ff8a8a; border-color: rgba(255,138,138,.4); }
  .err { color: #ff8a8a; font-size: 13px; margin-top: 10px; text-align: center; display: none; }
  .results { margin-top: 20px; display: none; }
  .rhead { font-size: 14px; color: var(--sub); margin: 4px 2px 12px; }
  .station {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    margin-bottom: 14px; overflow: hidden;
  }
  .shead {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 13px 15px; background: var(--card2);
  }
  .sname { font-size: 17px; font-weight: 700; }
  .sname .yr { color: var(--accent2); font-weight: 600; font-size: 14px; margin-left: 6px; }
  .dist { font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .scoord { padding: 8px 15px 0; font-size: 12.5px; color: var(--sub); }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 8px; }
  th, td { padding: 7px 6px; text-align: center; }
  th { color: var(--sub); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--line); }
  td { border-bottom: 1px solid rgba(255,255,255,.07); }
  tr:last-child td { border-bottom: none; }
  td:first-child, th:first-child { padding-left: 15px; }
  td:last-child, th:last-child { padding-right: 15px; }
  .null { color: #5a5a5a; }
  .rank {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    color: #000; font-size: 13px; font-weight: 800; margin-right: 8px; vertical-align: -4px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Arctic Sea pH searcher</h1>
  <div class="sub">Enter coordinates to find the 10 nearest stations</div>

  <div class="inputCard">
    <label for="lat">Latitude</label>
    <div class="coordRow">
      <button type="button" class="sign" id="latSign">+</button>
      <input id="lat" type="text" inputmode="decimal" placeholder="e.g. 72.345">
    </div>
    <label for="lon">Longitude</label>
    <div class="coordRow">
      <button type="button" class="sign neg" id="lonSign">−</button>
      <input id="lon" type="text" inputmode="decimal" placeholder="e.g. 168.69">
    </div>
    <button id="go">Find stations</button>
    <div class="err" id="err"></div>
  </div>

  <div class="results" id="results">
    <div class="rhead" id="rhead"></div>
    <div id="list"></div>
  </div>
</div>

function parseCoord(s) {
  s = (s || "").trim().replace(/,/g, " ");
  if (!s) return NaN;
  // supports "72.345", "-168 41.4" (deg min), "72 20 42" (deg min sec)
  let sign = 1;
  if (/^[-−]/.test(s)) { sign = -1; s = s.slice(1); }
  const parts = s.split(/\s+/).map(Number);
  if (parts.some(isNaN)) return NaN;
  let v = parts[0] || 0;
  if (parts.length > 1) v += parts[1] / 60;
  if (parts.length > 2) v += parts[2] / 3600;
  return sign * v;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371.0088, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad;
  let dLon = lon2 - lon1;
  // dateline wrap
  if (dLon > 180) dLon -= 360;
  if (dLon < -180) dLon += 360;
  dLon *= rad;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function fmt(v, d) { return v == null ? '<span class="null">–</span>' : Number(v).toFixed(d); }

function signOf(id) {
  return document.getElementById(id).textContent.trim() === '−' ? -1 : 1;

function search() {
  const err = document.getElementById('err');
  let lat = parseCoord(document.getElementById('lat').value);
  let lon = parseCoord(document.getElementById('lon').value);
  if (!isNaN(lat)) lat = signOf('latSign') * Math.abs(lat);
  if (!isNaN(lon)) lon = signOf('lonSign') * Math.abs(lon);
  err.style.display = 'none';
  if (isNaN(lat) || isNaN(lon) || Math.abs(lat) > 90 || Math.abs(lon) > 180) {
    err.textContent = 'Please check the coordinates (lat -90~90, lon -180~180)';
    err.style.display = 'block';
    document.getElementById('results').style.display = 'none';
    return;
  }
  const ranked = DATA
    .map(st => ({ ...st, d: haversine(lat, lon, st.lat, st.lon) }))
    .sort((a, b) => a.d - b.d)
    .slice(0, 10);

  document.getElementById('rhead').textContent =
    `10 nearest stations from ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;

  document.getElementById('list').innerHTML = ranked.map((st, i) => `
    <div class="station">
      <div class="shead">
        <div class="sname"><span class="rank">${i+1}</span>${st.site}<span class="yr">${st.year}</span></div>
        <div class="dist">${st.d < 10 ? st.d.toFixed(2) : st.d.toFixed(1)} km</div>
      </div>
      <div class="scoord">Lat ${st.lat.toFixed(5)}° · Lon ${st.lon.toFixed(5)}°</div>
      <table>
        <thead><tr><th>Light depth</th><th>Temp (°C)</th><th>Initial</th><th>+25ml</th><th>+5ml</th></tr></thead>
        <tbody>
          ${st.rows.map(r => `<tr>
            <td>${r[0]}</td><td>${fmt(r[1],1)}</td><td>${fmt(r[2],2)}</td><td>${fmt(r[3],2)}</td><td>${fmt(r[4],2)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`).join('');

  document.getElementById('results').style.display = 'block';
  document.getElementById('go').blur();
}

document.getElementById('go').addEventListener('click', search);
['latSign', 'lonSign'].forEach(id => {
  const b = document.getElementById(id);
  b.addEventListener('click', () => {
    const neg = b.textContent.trim() === '+';
    b.textContent = neg ? '−' : '+';
    b.classList.toggle('neg', neg);
  });
});
document.getElementById('lon').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
  });
}
</script>
